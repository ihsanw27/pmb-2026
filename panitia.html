<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Panitia Tes Fisik PMB PIPB</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; color: #334155; }
    .navbar-custom { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    .card-custom { background: white; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); padding: 30px; margin: 20px auto; max-width: 450px; }
    
    /* Perbaikan Tombol Login: Tidak Fade to White */
    .btn-primary-custom { 
      background-color: #1e40af; 
      color: white; 
      border: none; 
      border-radius: 10px; 
      padding: 12px; 
      font-weight: 600; 
      transition: background 0.2s ease-in-out;
    }
    .btn-primary-custom:hover { 
      background-color: #1e3a8a; /* Lebih gelap saat disorot */
      color: #ffffff !important; 
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
    }
    .btn-primary-custom:active { transform: scale(0.98); }

    .form-control, .form-select { border-radius: 10px; padding: 12px 15px; border: 1px solid #cbd5e1; }
    #reader { width: 100%; border-radius: 16px; overflow: hidden; border: 3px dashed #cbd5e1; background-color: #f8fafc; min-height: 250px; }
    .hidden { display: none !important; }
    .info-badge { background-color: #e0f2fe; color: #0369a1; border-radius: 8px; padding: 15px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark navbar-custom shadow-sm py-3">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-shield-check me-2"></i>Portal Petugas Lapangan</span>
    </div>
  </nav>

  <div class="container">
    <div id="view-login" class="card-custom text-center">
      <div class="mb-4 text-primary" style="font-size: 3rem;"><i class="bi bi-person-badge"></i></div>
      <h4 class="fw-bold mb-1">Login Petugas</h4>
      <p class="text-muted small mb-4">Masuk dengan Email & Kode</p>
      
      <div class="mb-3 text-start">
        <label class="small fw-bold text-muted ms-1">Email</label>
        <input type="email" id="email-login" class="form-control" placeholder="nama@email.com">
      </div>
      
      <div class="mb-4 text-start">
        <label class="small fw-bold text-muted ms-1">Kode Login</label>
        <input type="password" id="kodeLogin" class="form-control" placeholder="••••••••">
      </div>
             
      <button onclick="login()" class="btn btn-primary-custom w-100" id="btn-login">MASUK SISTEM</button>
    </div>

    <div id="view-dashboard" class="hidden">
      <div class="card-custom pt-3 pb-4">
        <div class="info-badge mb-4">
          <p class="mb-0 small text-uppercase fw-bold opacity-75">Petugas Aktif</p>
          <h5 id="nama-panitia" class="mb-0 fw-bold">Memuat...</h5>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-muted">Pilih Tugas (Multi-role):</label>
          <select id="pilih-tugas" class="form-select border-primary fw-bold text-primary shadow-sm"></select>
        </div>

        <div id="area-scanner">
          <div id="reader"></div>
          <button onclick="nyalakanKamera()" class="btn btn-outline-primary btn-custom w-100 mt-3 hidden" id="btn-restart-cam">Buka Kamera</button>
        </div>

        <div id="form-nilai" class="hidden mt-2">
          <div class="alert alert-success border-0 shadow-sm mb-4">
            <small class="d-block opacity-75">Peserta:</small>
            <h5 id="nama-peserta" class="fw-bold mb-0"></h5>
          </div>
          
          <div class="mb-3 p-3 bg-light rounded border">
            <label class="form-label small fw-bold text-muted" id="label-input">Input:</label>
            <div id="wrapper-lari" class="hidden">
              <input type="number" id="input-lari" class="form-control form-control-lg" placeholder="Masukkan Angka">
            </div>
            <div id="wrapper-checklist" class="hidden py-2 text-center">
              <div class="form-check form-switch d-inline-block text-start" style="transform: scale(1.2);">
                <input class="form-check-input" type="checkbox" id="input-check-lolos">
                <label class="form-check-label ms-2 fw-bold text-success" for="input-check-lolos">LOLOS</label>
              </div>
            </div>
          </div>
          
          <div class="mb-4 text-start">
            <label class="small fw-bold text-muted">Catatan (Opsional):</label>
            <textarea id="input-catatan" class="form-control" rows="2"></textarea>
          </div>
          
          <div class="row g-2">
            <div class="col-4"><button onclick="batal()" class="btn btn-light w-100 border">Batal</button></div>
            <div class="col-8"><button onclick="simpan()" class="btn btn-success w-100 fw-bold" id="btn-simpan">SIMPAN</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec";
    let html5QrCode;
    let dataHadir = [];
    let pesertaSedangDinilai = "";

    async function login() {
      let email = document.getElementById("email-login").value;
      let kode = document.getElementById("kodeLogin").value;
      let btn = document.getElementById("btn-login");
      
      if(!email || !kode) return;
      btn.innerHTML = `Memuat...`;
      btn.disabled = true;
      
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", email, kodeLogin: kode }) });
        const res = await response.json();
        
        if(res && res.success) {
          document.getElementById("view-login").classList.add("hidden");
          document.getElementById("view-dashboard").classList.remove("hidden");
          document.getElementById("nama-panitia").innerText = res.nama;
          
          // Reset & Isi Dropdown
          let select = document.getElementById("pilih-tugas");
          select.innerHTML = "";
          res.kategoriList.forEach(t => {
            let opt = document.createElement("option");
            opt.value = t;
            opt.innerText = t;
            select.appendChild(opt);
          });
          
          sesuaikanInput();
          
          // Load Peserta
          const resHadir = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getHadir" }) });
          const hadir = await resHadir.json();
          dataHadir = hadir.data;
          
          html5QrCode = new Html5Qrcode("reader");
          nyalakanKamera();
        } else {
          Swal.fire('Gagal', res.message, 'error');
        }
      } catch (e) {
        Swal.fire('Error', 'Koneksi bermasalah', 'error');
      } finally {
        btn.innerHTML = `MASUK SISTEM`;
        btn.disabled = false;
      }
    }

    function sesuaikanInput() {
      const tugas = document.getElementById("pilih-tugas").value.toLowerCase();
      const wrapLari = document.getElementById("wrapper-lari");
      const wrapCheck = document.getElementById("wrapper-checklist");
      const label = document.getElementById("label-input");

      if (tugas.includes("lari")) {
        wrapLari.classList.remove("hidden"); wrapCheck.classList.add("hidden");
        label.innerText = "Hasil Lari (Angka):";
      } else if (tugas.includes("kesehatan")) {
        wrapLari.classList.add("hidden"); wrapCheck.classList.add("hidden");
        label.innerText = "Isi Catatan Medis:";
      } else {
        wrapLari.classList.add("hidden"); wrapCheck.classList.remove("hidden");
        label.innerText = "Kelulusan:";
      }
    }

    document.getElementById("pilih-tugas").addEventListener("change", sesuaikanInput);

    // Fungsi Kamera, ScanSuccess, Batal, dan Simpan tetap sama seperti versi sebelumnya.
    // Pastikan memanggil sesuaikanInput() di dalam onScanSuccess() agar UI reset.
    
    function nyalakanKamera() {
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess, () => {});
    }

    function onScanSuccess(decodedText) {
      html5QrCode.stop().then(() => {
        let p = dataHadir.find(x => x.no_peserta.toString() === decodedText.toString());
        if(p) {
          pesertaSedangDinilai = decodedText;
          document.getElementById("nama-peserta").innerText = p.nama;
          document.getElementById("area-scanner").classList.add("hidden");
          document.getElementById("form-nilai").classList.remove("hidden");
        } else {
          Swal.fire('Error', 'Peserta belum Check-In!', 'error').then(() => nyalakanKamera());
        }
      });
    }

    function batal() {
      document.getElementById("form-nilai").classList.add("hidden");
      document.getElementById("area-scanner").classList.remove("hidden");
      nyalakanKamera();
    }

    async function simpan() {
      const tugas = document.getElementById("pilih-tugas").value;
      let nilai = "";
      if(tugas.toLowerCase().includes("lari")) nilai = document.getElementById("input-lari").value;
      else if(tugas.toLowerCase().includes("kesehatan")) nilai = "";
      else nilai = document.getElementById("input-check-lolos").checked ? "Lolos" : "Tidak Lolos";

      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({
        action: "simpanNilai",
        noPeserta: pesertaSedangDinilai,
        kategori: tugas,
        nilaiUtama: nilai,
        nilaiCatatan: document.getElementById("input-catatan").value
      })});
      
      const result = await res.json();
      if(result.success) {
        Swal.fire({icon:'success', title:'Tersimpan', timer:1000, showConfirmButton:false});
        batal();
      }
    }
  </script>
</body>
</html>
