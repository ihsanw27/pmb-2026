<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Panitia Lapangan Tes Fisik PMB Politeknik Industri Petrokimia Banten</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f1f5f9; color: #334155; }
    .card-custom { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 25px; margin: 20px auto; max-width: 420px; }
    .form-control:focus { box-shadow: none; border-color: #94a3b8; background-color: #fff; }
    .input-group:focus-within .input-group-text, .input-group:focus-within .form-control { border-color: #94a3b8; color: #3b82f6; transition: 0.2s; }
    .btn-primary-custom { background-color: #2563eb; color: white; transition: 0.2s; }
    .btn-primary-custom:hover { background-color: #1d4ed8; }
    #reader { border-radius: 12px; overflow: hidden; border: 2px dashed #cbd5e1; min-height: 250px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    
    <div id="view-login" class="card-custom text-center mt-4">
      <h4 class="fw-bold mb-4">Login Petugas</h4>
      <div class="input-group mb-3 text-start">
        <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
        <input type="email" id="email" class="form-control border-start-0" placeholder="Email">
      </div>
      <div class="input-group mb-4 text-start">
        <span class="input-group-text bg-white"><i class="bi bi-key text-muted"></i></span>
        <input type="password" id="kode" class="form-control border-start-0 border-end-0" placeholder="Kode Login">
        <span class="input-group-text bg-white" onclick="togglePwd()"><i class="bi bi-eye-slash text-muted" id="icon-mata"></i></span>
      </div>
      <button onclick="login()" class="btn btn-primary-custom w-100 fw-bold py-2" id="btn-login">MASUK</button>
    </div>

    <div id="view-dashboard" class="hidden card-custom mt-4">
      <div class="d-flex justify-content-between mb-3 border-bottom pb-2">
        <div><small class="text-muted d-block">Petugas</small><strong id="nama-panitia" class="text-primary"></strong></div>
        <button onclick="logout()" class="btn btn-sm btn-light text-danger"><i class="bi bi-power fs-5"></i></button>
      </div>

      <select id="pilih-tugas" class="form-select fw-bold text-primary mb-3 shadow-sm" onchange="resetUI()"></select>
      
      <div id="area-scanner">
        <button onclick="syncData()" id="btn-sync" class="btn btn-outline-secondary btn-sm w-100 mb-3"><i class="bi bi-arrow-repeat"></i> Sinkronisasi Peserta</button>
        <div id="reader"></div>
        <button onclick="initCam()" class="btn btn-primary-custom btn-sm w-100 mt-2 hidden" id="btn-cam">Buka Kamera</button>
      </div>

      <div id="form-nilai" class="hidden">
        <div class="alert alert-info py-2"><small>Peserta:</small><br><strong id="nama-peserta"></strong></div>
        
        <div id="wrap-lari" class="hidden mb-3"><input type="number" id="val-lari" class="form-control form-control-lg" placeholder="Angka Hasil Lari"></div>
        <div id="wrap-check" class="hidden mb-3 text-center">
          <div class="form-check form-switch d-inline-block" style="transform:scale(1.2);">
            <input class="form-check-input" type="checkbox" id="val-check" onchange="uiCheck()">
            <label class="form-check-label ms-2 fw-bold text-danger" id="lbl-check">TIDAK LOLOS</label>
          </div>
        </div>
        
        <textarea id="val-catatan" class="form-control mb-3" rows="2" placeholder="Catatan opsional..."></textarea>
        
        <div class="row g-2">
          <div class="col-4"><button onclick="batal()" class="btn btn-light w-100 border">Batal</button></div>
          <div class="col-8"><button onclick="simpan()" class="btn btn-success fw-bold w-100" id="btn-simpan">SIMPAN</button></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec";
    let qrScanner, activeNo = "", pesertaList = [];

    window.onload = () => { if(localStorage.getItem("pmbSess")) restoreSess(); };

    async function api(payload) {
      try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        return JSON.parse(await res.text());
      } catch(e) { Swal.fire('Error','Jaringan terputus','error'); return null; }
    }

    function togglePwd() {
      let i = document.getElementById("kode"), ic = document.getElementById("icon-mata");
      i.type = i.type === "password" ? "text" : "password";
      ic.className = i.type === "password" ? "bi bi-eye-slash text-muted" : "bi bi-eye text-primary";
    }

    async function login() {
      let email = document.getElementById("email").value, kode = document.getElementById("kode").value;
      if(!email || !kode) return;
      document.getElementById("btn-login").disabled = true;
      let res = await api({ action: "login", email, kodeLogin: kode });
      if(res && res.success) {
        localStorage.setItem("pmbSess", JSON.stringify({ nama: res.nama, roles: res.kategoriList }));
        restoreSess();
      } else { Swal.fire('Gagal', res?.message, 'error'); }
      document.getElementById("btn-login").disabled = false;
    }

    async function restoreSess() {
      let sess = JSON.parse(localStorage.getItem("pmbSess"));
      document.getElementById("view-login").classList.add("hidden");
      document.getElementById("view-dashboard").classList.remove("hidden");
      document.getElementById("nama-panitia").textContent = sess.nama; // Aman dari XSS
      
      let sel = document.getElementById("pilih-tugas"); sel.innerHTML = "";
      sess.roles.forEach(r => sel.innerHTML += `<option value="${r}">${r}</option>`);
      
      resetUI(); await syncData(false);
      qrScanner = new Html5Qrcode("reader"); initCam();
    }

    function logout() { localStorage.removeItem("pmbSess"); location.reload(); }

    async function syncData(toast=true) {
      let res = await api({ action: "getHadir" });
      if(res && res.success) { pesertaList = res.data; if(toast) Swal.fire({title:'Update', timer:1000, showConfirmButton:false, toast:true}); }
    }

    function resetUI() {
      let t = document.getElementById("pilih-tugas").value.toLowerCase();
      document.getElementById("wrap-lari").classList.toggle("hidden", !t.includes("lari"));
      document.getElementById("wrap-check").classList.toggle("hidden", t.includes("lari") || t.includes("kesehatan"));
      document.getElementById("val-check").checked = false; uiCheck();
    }

    function uiCheck() {
      let c = document.getElementById("val-check"), l = document.getElementById("lbl-check");
      l.textContent = c.checked ? "LOLOS TES" : "TIDAK LOLOS";
      l.className = c.checked ? "form-check-label ms-2 fw-bold text-success" : "form-check-label ms-2 fw-bold text-danger";
    }

    function initCam() {
      document.getElementById("btn-cam").classList.add("hidden");
      qrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan, ()=>{}).catch(()=>{ document.getElementById("btn-cam").classList.remove("hidden"); });
    }

    function onScan(txt) {
      qrScanner.stop().then(() => {
        let p = pesertaList.find(x => x.no.toString() === txt.toString());
        if(!p) return Swal.fire('Ditolak','Peserta belum Check-In!','error').then(batal);
        
        let t = document.getElementById("pilih-tugas").value.toLowerCase();
        if ((t.includes("lari") || t.includes("sempit") || t.includes("ketinggian")) && p.verif.toLowerCase() !== "lolos") {
          return Swal.fire('DITOLAK!',`Peserta ${p.nama} Belum Lolos Verifikasi!`,'error').then(batal);
        }

        activeNo = txt;
        document.getElementById("nama-peserta").textContent = `${p.nama} (${txt})`; // Aman dari XSS
        document.getElementById("val-lari").value = ""; document.getElementById("val-catatan").value = ""; resetUI();
        document.getElementById("area-scanner").classList.add("hidden"); document.getElementById("form-nilai").classList.remove("hidden");
      });
    }

    function batal() { document.getElementById("form-nilai").classList.add("hidden"); document.getElementById("area-scanner").classList.remove("hidden"); initCam(); }

    async function simpan() {
      let t = document.getElementById("pilih-tugas").value, btn = document.getElementById("btn-simpan");
      let val = t.toLowerCase().includes("lari") ? document.getElementById("val-lari").value : (t.toLowerCase().includes("kesehatan") ? "" : (document.getElementById("val-check").checked ? "Lolos" : "Tidak Lolos"));
      
      btn.disabled = true; btn.textContent = "Loading...";
      let res = await api({ action: "simpanNilai", noPeserta: activeNo, kategori: t, nilaiUtama: val, nilaiCatatan: document.getElementById("val-catatan").value });
      
      if(res && res.success) { Swal.fire({icon:'success', title:'Tersimpan', timer:1500, showConfirmButton:false}); setTimeout(batal, 1500); } 
      else { Swal.fire('Gagal', res?.message, 'error'); btn.disabled = false; btn.textContent = "SIMPAN"; }
    }
  </script>
</body>
</html>
