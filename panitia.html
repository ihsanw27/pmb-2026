<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Panitia PMB</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #1e293b; }
    .card-custom { background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; margin: 20px auto; max-width: 450px; }
    
    .btn-primary-custom { 
      background-color: #1e40af; color: white; border: none; border-radius: 10px; 
      padding: 12px; font-weight: 600; transition: all 0.2s; 
    }
    .btn-primary-custom:hover { 
      background-color: #1e3a8a !important; color: white !important;
      transform: translateY(-1px); box-shadow: 0 5px 15px rgba(30,64,175,0.4);
    }
    .btn-primary-custom:active { transform: translateY(0); }

    #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; min-height: 250px; }
    .hidden { display: none !important; }
    .badge-user { background: #dbeafe; color: #1e40af; padding: 12px; border-radius: 10px; margin-bottom: 20px; }
    
    /* Agar teks sejajar dengan sakelar */
    .form-check-label { vertical-align: middle; padding-top: 2px; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div class="container">
    <div id="view-login" class="card-custom text-center mt-5">
      <h3 class="fw-bold mb-4">Login Panitia</h3>
      <div class="text-start mb-3">
        <label class="small fw-bold text-muted">Email Terdaftar</label>
        <input type="email" id="email" class="form-control" placeholder="user@poltek.ac.id">
      </div>
      <div class="text-start mb-4">
        <label class="small fw-bold text-muted">Kode Akses</label>
        <input type="password" id="kode" class="form-control" placeholder="••••••">
      </div>
      <button onclick="doLogin()" id="btn-login" class="btn btn-primary-custom w-100">MASUK KE SISTEM</button>
    </div>

    <div id="view-dashboard" class="hidden">
      <div class="card-custom">
        <div class="badge-user">
          <small class="d-block opacity-75">Selamat Bertugas,</small>
          <strong id="display-nama">Nama Panitia</strong>
        </div>

        <div class="mb-4">
          <label class="small fw-bold text-muted">Pilih Kategori Tugas:</label>
          <select id="pilih-tugas" class="form-select border-primary fw-bold" onchange="updateUI()"></select>
        </div>

        <div id="scanner-box">
          <div id="reader"></div>
          <button id="btn-retry" class="btn btn-outline-primary w-100 mt-3 hidden" onclick="startScan()">Buka Kamera</button>
        </div>

        <div id="form-nilai" class="hidden">
          <div class="alert alert-info py-2">
            <small>Peserta:</small><br><strong id="nama-peserta">Nama</strong>
          </div>

          <div id="ui-input-lari" class="hidden mb-3">
            <label class="small fw-bold">Waktu Lari (Angka):</label>
            <input type="number" id="val-lari" class="form-control form-control-lg" placeholder="Contoh: 12">
          </div>

          <div id="ui-input-check" class="hidden mb-3 text-center">
            <div class="form-check form-switch d-inline-block text-start">
              <input class="form-check-input" type="checkbox" id="val-check" style="width: 50px; height: 25px;" onchange="toggleLabel()">
              <label class="form-check-label ms-2 fw-bold text-danger" id="label-check" for="val-check">TIDAK LOLOS</label>
            </div>
          </div>

          <div class="mb-4">
            <label class="small fw-bold">Catatan Petugas:</label>
            <textarea id="val-catatan" class="form-control" rows="2"></textarea>
          </div>

          <div class="row g-2">
            <div class="col-4"><button class="btn btn-light border w-100" onclick="cancelInput()">Batal</button></div>
            <div class="col-8"><button class="btn btn-success fw-bold w-100" onclick="submitNilai()" id="btn-simpan">SIMPAN DATA</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // MASUKKAN URL WEB APP ANDA DI SINI
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec"; 
    
    let scanner;
    let pesertaNo = "";
    let dataHadir = [];

    async function doLogin() {
      const email = document.getElementById('email').value;
      const kode = document.getElementById('kode').value;
      const btn = document.getElementById('btn-login');
      if(!email || !kode) return;

      btn.disabled = true;
      btn.innerText = "Memverifikasi...";

      try {
        const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action:"login", email, kodeLogin:kode })});
        const res = await resp.json();
        if(res.success) {
          document.getElementById('view-login').classList.add('hidden');
          document.getElementById('view-dashboard').classList.remove('hidden');
          document.getElementById('display-nama').innerText = res.nama;
          
          const sel = document.getElementById('pilih-tugas');
          sel.innerHTML = "";
          res.kategoriList.forEach(k => sel.innerHTML += `<option value="${k}">${k}</option>`);
          
          updateUI();
          loadPeserta();
        } else {
          Swal.fire("Gagal", res.message, "error");
        }
      } catch(e) { Swal.fire("Error", "Gagal menyambung ke server", "error"); }
      btn.disabled = false; btn.innerText = "MASUK KE SISTEM";
    }

    // Fungsi Untuk Mengubah Teks Label Lolos/Tidak Lolos
    function toggleLabel() {
      const check = document.getElementById('val-check');
      const label = document.getElementById('label-check');
      if(check.checked) {
        label.innerText = "LOLOS TES";
        label.className = "form-check-label ms-2 fw-bold text-success"; // Warna Hijau
      } else {
        label.innerText = "TIDAK LOLOS";
        label.className = "form-check-label ms-2 fw-bold text-danger"; // Warna Merah
      }
    }

    function updateUI() {
      const tugas = document.getElementById('pilih-tugas').value;
      document.getElementById('ui-input-lari').classList.toggle('hidden', !tugas.includes("Lari"));
      document.getElementById('ui-input-check').classList.toggle('hidden', tugas.includes("Lari") || tugas.includes("Kesehatan"));
    }

    async function loadPeserta() {
      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action:"getHadir" })});
      const res = await resp.json();
      dataHadir = res.data;
      scanner = new Html5Qrcode("reader");
      startScan();
    }

    function startScan() {
      document.getElementById('btn-retry').classList.add('hidden');
      scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
        const p = dataHadir.find(x => x.no_peserta.toString() === txt.toString());
        if(p) {
          scanner.stop();
          pesertaNo = txt;
          document.getElementById('nama-peserta').innerText = p.nama;
          
          // Reset form input setiap scan peserta baru
          document.getElementById('val-lari').value = "";
          document.getElementById('val-catatan').value = "";
          document.getElementById('val-check').checked = false; // Kembalikan ke mati (default)
          toggleLabel(); // Panggil fungsi ubah warna agar jadi merah (Tidak Lolos) lagi
          
          document.getElementById('scanner-box').classList.add('hidden');
          document.getElementById('form-nilai').classList.remove('hidden');
        } else {
          Swal.fire("Peringatan", "Peserta belum Check-In!", "warning");
        }
      }, () => {});
    }

    function cancelInput() {
      document.getElementById('form-nilai').classList.add('hidden');
      document.getElementById('scanner-box').classList.remove('hidden');
      startScan();
    }

    async function submitNilai() {
      const tugas = document.getElementById('pilih-tugas').value;
      const btn = document.getElementById('btn-simpan');
      let valUtama = "";

      if(tugas.includes("Lari")) valUtama = document.getElementById('val-lari').value;
      else if(!tugas.includes("Kesehatan")) valUtama = document.getElementById('val-check').checked ? "Lolos" : "Tidak Lolos";

      btn.disabled = true; btn.innerText = "Menyimpan...";
      
      const payload = {
        action: "simpanNilai",
        noPeserta: pesertaNo,
        kategori: tugas,
        nilaiUtama: valUtama,
        nilaiCatatan: document.getElementById('val-catatan').value
      };

      const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload)});
      const res = await resp.json();
      if(res.success) {
        Swal.fire({ icon: 'success', title: 'Data Berhasil Disimpan', showConfirmButton: false, timer: 1500 });
        cancelInput();
      }
      btn.disabled = false; btn.innerText = "SIMPAN DATA";
    }
  </script>
</body>
</html>
