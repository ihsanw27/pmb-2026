<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Panitia Tes Fisik PMB Politeknik Industri Petrokimia Banten</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; color: #334155; }
    .navbar-custom { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    .card-custom { background: white; border: none; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); padding: 30px; margin: 20px auto; max-width: 450px; }
    .form-control, .form-select { border-radius: 10px; padding: 12px 15px; border: 1px solid #cbd5e1; }
    .form-control:focus { box-shadow: none; border-color: #3b82f6; }
    .btn-custom { border-radius: 10px; padding: 12px; font-weight: 600; transition: all 0.3s ease; }
    .btn-primary-custom { background-color: #2563eb; color: white; border: none; }
    .btn-primary-custom:hover { background-color: #1d4ed8; color: white; }
    
    #reader { width: 100%; border-radius: 16px; overflow: hidden; border: 3px dashed #cbd5e1; background-color: #f8fafc; min-height: 250px; position: relative; }
    #reader video { object-fit: cover; border-radius: 16px; }
    .hidden { display: none !important; }
    .info-badge { background-color: #e0f2fe; color: #0369a1; border-radius: 8px; padding: 15px; }
    .form-check-label { vertical-align: middle; padding-top: 2px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark navbar-custom shadow-sm py-3">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-shield-check me-2"></i>Portal Panitia Tes Fisik</span>
    </div>
  </nav>

  <div class="container">
    
    <div id="view-login" class="card-custom text-center">
      <div class="mb-4 text-primary" style="font-size: 3rem;"><i class="bi bi-person-badge"></i></div>
      <h4 class="fw-bold mb-1">Login Petugas</h4>
      <p class="text-muted small mb-4">Masuk dengan Email & Kode Anda</p>
      
      <div class="input-group mb-3 text-start">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope text-muted"></i></span>
        <input type="email" id="email-login" class="form-control border-start-0" placeholder="Alamat Email" required>
      </div>
      
      <div class="input-group mb-4 text-start">
        <span class="input-group-text bg-white border-end-0"><i class="bi bi-key text-muted"></i></span>
        <input type="password" id="kodeLogin" class="form-control border-start-0 border-end-0" placeholder="Kode Login">
        <span class="input-group-text bg-white border-start-0" onclick="togglePassword()" style="cursor: pointer;" title="Intip Sandi">
          <i class="bi bi-eye-slash text-muted" id="icon-mata"></i>
        </span>
      </div>
             
      <button onclick="login()" class="btn btn-primary-custom btn-custom w-100" id="btn-login">MASUK SISTEM</button>
    </div>

    <div id="view-dashboard" class="hidden">
      <div class="card-custom pt-3 pb-4">
        
        <div class="info-badge mb-4 d-flex justify-content-between align-items-center">
          <div>
            <p class="mb-0 small text-uppercase fw-bold opacity-75">Petugas Aktif</p>
            <h5 id="nama-panitia" class="mb-0 fw-bold">Memuat...</h5>
          </div>
          <button onclick="logout()" class="btn btn-sm btn-outline-danger border-0" title="Keluar">
            <i class="bi bi-box-arrow-right fs-4"></i>
          </button>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-muted">Kategori Tugas Anda:</label>
          <select id="pilih-tugas" class="form-select border-primary fw-bold text-primary shadow-sm" onchange="sesuaikanInput()"></select>
        </div>

        <div id="area-scanner">
          <button onclick="refreshDataPeserta()" class="btn btn-sm btn-outline-secondary w-100 mb-3 fw-bold" id="btn-refresh">
            <i class="bi bi-arrow-repeat me-1"></i> Sinkronisasi Data Terbaru
          </button>

          <h6 class="text-center fw-bold mb-3"><i class="bi bi-qr-code-scan me-2"></i>Arahkan ke QR Peserta</h6>
          <div id="reader"></div>
          <button onclick="nyalakanKamera()" class="btn btn-outline-primary btn-custom w-100 mt-3 hidden" id="btn-restart-cam">
            Nyalakan Ulang Kamera
          </button>
        </div>

        <div id="form-nilai" class="hidden mt-2">
          <div class="alert alert-success border-0 shadow-sm d-flex align-items-center mb-4">
            <i class="bi bi-check-circle-fill fs-3 me-3"></i>
            <div>
              <small class="d-block opacity-75">Scan Berhasil!</small>
              <h5 id="nama-peserta" class="fw-bold mb-0 text-dark"></h5>
            </div>
          </div>
          
          <div class="mb-3 p-3 bg-light rounded border">
            <label class="form-label small fw-bold text-muted" id="label-input">Input Penilaian:</label>
            
            <div id="wrapper-lari" class="hidden">
              <input type="number" id="input-lari" class="form-control form-control-lg" placeholder="Masukkan Angka">
            </div>

            <div id="wrapper-checklist" class="hidden py-2 text-center">
              <div class="form-check form-switch d-inline-block text-start" style="transform: scale(1.3); transform-origin: left center;">
                <input class="form-check-input" type="checkbox" id="input-check-lolos" onchange="toggleLabel()">
                <label class="form-check-label ms-2 fw-bold text-danger" id="label-check" for="input-check-lolos">TIDAK LOLOS</label>
              </div>
            </div>
          </div>
          
          <div class="mb-4">
            <label class="form-label small fw-bold text-muted">Catatan (Opsional):</label>
            <textarea id="input-catatan" class="form-control" rows="2" placeholder="Catatan opsional..."></textarea>
          </div>
          
          <div class="row g-2">
            <div class="col-4">
              <button onclick="batal()" class="btn btn-light btn-custom w-100 border text-muted">Batal</button>
            </div>
            <div class="col-8">
              <button onclick="simpan()" class="btn btn-success btn-custom w-100" id="btn-simpan">SIMPAN</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // ==========================================================
    // DEPLOY BARU GOOGLE APPS SCRIPT DAN PASTE URL DI BAWAH INI
    // ==========================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec";

    let html5QrCode;
    let pesertaSedangDinilai = "";
    let dataHadir = [];
    let isCameraRunning = false;   // mencegah start() dipanggil ganda
    let isScanProcessing = false;  // debounce: cegah onScanSuccess double-fire

    // --- INISIALISASI ---
    window.onload = () => {
      checkSession();
      // Enter-to-submit untuk form login
      ["email-login", "kodeLogin"].forEach(id => {
        document.getElementById(id).addEventListener("keydown", (e) => {
          if (e.key === "Enter") login();
        });
      });
    };

    // --- FUNGSI API FETCH ---
    // silent=true: jangan tampilkan dialog error (untuk refresh otomatis di background)
    async function apiCall(dataPayload, silent = false) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(dataPayload),
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        const text = await response.text();

        if (!response.ok) {
          console.error(`HTTP ${response.status}:`, text);
          return { success: false, message: `Error server (${response.status}). Pastikan API masih aktif.` };
        }

        try {
          return JSON.parse(text);
        } catch (err) {
          // Respon bukan JSON (misal halaman error HTML dari server)
          console.error("Respon bukan JSON:", text);
          return { success: false, message: "Terjadi kesalahan format data di server. Pastikan tidak ada karakter aneh di Google Sheets." };
        }
      } catch (e) {
        clearTimeout(timeoutId);
        if (!silent) {
          if (e.name === 'AbortError') {
            Swal.fire('Timeout', 'Permintaan memakan waktu terlalu lama. Periksa koneksi internet Anda.', 'error');
          } else {
            Swal.fire('Error', 'Internet terputus!', 'error');
          }
        }
        return null;
      }
    }

    // --- FUNGSI SESI & LOGIN ---
    async function checkSession() {
      const saved = localStorage.getItem("panitiaSessionPMB");
      if (saved) {
        const res = JSON.parse(saved);
        setupDashboard(res.nama, res.kategoriList);
        await refreshDataPeserta(false);
        initCamera();
      }
    }

    function setupDashboard(nama, kategoriList) {
      document.getElementById("view-login").classList.add("hidden");
      document.getElementById("view-dashboard").classList.remove("hidden");
      document.getElementById("nama-panitia").innerText = nama;

      let select = document.getElementById("pilih-tugas");
      select.innerHTML = "";
      kategoriList.forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);
      sesuaikanInput();
    }

    async function login() {
      let email = document.getElementById("email-login").value;
      let kode = document.getElementById("kodeLogin").value;
      let btn = document.getElementById("btn-login");

      // Nonaktifkan tombol segera untuk mencegah klik ganda
      btn.disabled = true;

      if (!email || !kode) {
        btn.disabled = false;
        return Swal.fire('Oops', 'Isi Email dan Kode Login!', 'warning');
      }

      btn.innerHTML = `Memverifikasi...`;
      let res = await apiCall({ action: "login", email: email, kodeLogin: kode });

      if (res && res.success) {
        localStorage.setItem("panitiaSessionPMB", JSON.stringify({ nama: res.nama, kategoriList: res.kategoriList }));
        setupDashboard(res.nama, res.kategoriList);
        await refreshDataPeserta(false);
        initCamera();
      } else {
        Swal.fire('Gagal Login', res ? res.message : 'Koneksi gagal', 'error');
        btn.innerHTML = `MASUK SISTEM`;
        btn.disabled = false;
      }
    }

    function logout() {
      Swal.fire({
        title: 'Keluar?', text: "Sesi Anda akan dihapus.", icon: 'warning',
        showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Ya, Keluar'
      }).then((res) => {
        if (res.isConfirmed) { localStorage.removeItem("panitiaSessionPMB"); location.reload(); }
      });
    }

    // --- FUNGSI UI UX ---
    function togglePassword() {
      let input = document.getElementById("kodeLogin");
      let icon = document.getElementById("icon-mata");
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye-slash", "bi-eye");
        icon.classList.add("text-primary"); icon.classList.remove("text-muted");
      } else {
        input.type = "password";
        icon.classList.replace("bi-eye", "bi-eye-slash");
        icon.classList.add("text-muted"); icon.classList.remove("text-primary");
      }
    }

    function toggleLabel() {
      const check = document.getElementById('input-check-lolos');
      const label = document.getElementById('label-check');
      if (check.checked) {
        label.innerText = "LOLOS TES"; label.className = "form-check-label ms-2 fw-bold text-success";
      } else {
        label.innerText = "TIDAK LOLOS"; label.className = "form-check-label ms-2 fw-bold text-danger";
      }
    }

    function sesuaikanInput() {
      const tugas = document.getElementById("pilih-tugas").value.toLowerCase();
      const wrapLari = document.getElementById("wrapper-lari");
      const wrapCheck = document.getElementById("wrapper-checklist");
      const label = document.getElementById("label-input");

      if (tugas.includes("lari")) {
        wrapLari.classList.remove("hidden"); wrapCheck.classList.add("hidden");
        label.innerText = "Input Hasil Lari (Angka):";
      } else if (tugas.includes("kesehatan")) {
        wrapLari.classList.add("hidden"); wrapCheck.classList.add("hidden");
        label.innerText = "Silakan isi Catatan Medis di bawah:";
      } else {
        wrapLari.classList.add("hidden"); wrapCheck.classList.remove("hidden");
        label.innerText = "Status Kelulusan:";
        document.getElementById("input-check-lolos").checked = false; toggleLabel();
      }
    }

    // --- FUNGSI DATA & SCANNER ---
    async function refreshDataPeserta(showToast = true) {
      let btn = document.getElementById("btn-refresh");
      if (btn) { btn.innerHTML = `<i class="bi bi-hourglass-split me-1"></i> Menyinkron...`; btn.disabled = true; }

      // silent=true saat refresh otomatis agar tidak menampilkan dialog error
      let res = await apiCall({ action: "getHadir" }, !showToast);
      if (res && res.success) {
        dataHadir = res.data;
        if (showToast) Swal.fire({ icon: 'success', title: 'Data Diperbarui!', toast: true, position: 'top', showConfirmButton: false, timer: 2000 });
      } else if (!res && !showToast) {
        console.warn("Gagal memuat data peserta (silent refresh).");
      }
      if (btn) { btn.innerHTML = `<i class="bi bi-arrow-repeat me-1"></i> Sinkronisasi Data Terbaru`; btn.disabled = false; }
    }

    function initCamera() {
      if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
      nyalakanKamera();
    }

    function nyalakanKamera() {
      if (isCameraRunning) return; // Cegah start() ganda
      document.getElementById("btn-restart-cam").classList.add("hidden");
      isCameraRunning = true;
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
        onScanSuccess,
        () => {}
      ).catch((err) => {
        isCameraRunning = false;
        let msg = 'Izinkan penggunaan kamera di browser.';
        if (err) {
          if (err.name === 'NotAllowedError' || (err.message && err.message.toLowerCase().includes('permission'))) {
            msg = 'Akses kamera ditolak. Silakan izinkan kamera di pengaturan browser.';
          } else if (err.name === 'NotFoundError') {
            msg = 'Tidak ada kamera yang ditemukan di perangkat ini.';
          } else if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            msg = 'Kamera membutuhkan koneksi HTTPS. Buka halaman ini melalui HTTPS.';
          }
        }
        Swal.fire('Kamera Error', msg, 'warning');
        document.getElementById("btn-restart-cam").classList.remove("hidden");
      });
    }

    function onScanSuccess(decodedText) {
      // Debounce: abaikan jika sudah dalam proses scan
      if (isScanProcessing) return;
      isScanProcessing = true;

      const processResult = () => {
        isCameraRunning = false;
        document.getElementById("area-scanner").classList.add("hidden");
        document.getElementById("btn-restart-cam").classList.remove("hidden");

        // Pastikan data peserta sudah dimuat
        if (dataHadir.length === 0) {
          Swal.fire({
            icon: 'warning', title: 'Data Belum Dimuat',
            text: 'Data peserta belum tersedia. Coba sinkronisasi ulang terlebih dahulu.',
            confirmButtonText: 'OK'
          }).then(() => batal());
          return;
        }

        let peserta = dataHadir.find(p => p.no_peserta.toString() === decodedText.toString());

        if (peserta) {
          // SAFEGUARD FRONTEND
          const tugasSkg = document.getElementById("pilih-tugas").value.toLowerCase();
          const butuhVerif = tugasSkg.includes("ketinggian") || tugasSkg.includes("sempit") || tugasSkg.includes("lari");

          if (butuhVerif && peserta.lolos_verifikasi.toLowerCase() !== "lolos") {
            Swal.fire({
              icon: 'error', title: 'DITOLAK!',
              text: `Peserta ${peserta.nama} BELUM Lolos Verifikasi Administrasi!`,
              confirmButtonText: 'Kembali Scan'
            }).then(() => batal());
            return;
          }

          pesertaSedangDinilai = decodedText;
          document.getElementById("nama-peserta").innerText = `${peserta.nama} (${decodedText})`;

          document.getElementById("input-lari").value = "";
          document.getElementById("input-catatan").value = "";
          document.getElementById("input-check-lolos").checked = false;
          toggleLabel();
          document.getElementById("form-nilai").classList.remove("hidden");
        } else {
          Swal.fire({
            icon: 'error', title: 'Belum Check-In!',
            text: `Peserta belum melapor ke meja pendaftaran.`,
            confirmButtonText: 'Scan Ulang'
          }).then(() => batal());
        }
      };

      // Hentikan kamera lalu proses hasil; tangani jika kamera sudah berhenti
      html5QrCode.stop().then(processResult).catch(() => processResult());
    }

    function batal() {
      document.getElementById("form-nilai").classList.add("hidden");
      document.getElementById("area-scanner").classList.remove("hidden");
      pesertaSedangDinilai = "";
      isScanProcessing = false;

      if (isCameraRunning) {
        // Hentikan dulu jika masih berjalan, baru nyalakan ulang
        html5QrCode.stop().catch((err) => console.warn('Gagal menghentikan kamera:', err)).finally(() => {
          isCameraRunning = false;
          nyalakanKamera();
        });
      } else {
        nyalakanKamera();
      }
    }

    async function simpan() {
      const tugas = document.getElementById("pilih-tugas").value;
      const tugasLower = tugas.toLowerCase();
      let nilai = "";

      if (tugasLower.includes("lari")) {
        nilai = document.getElementById("input-lari").value;
        if (!nilai) return Swal.fire('Oops', 'Mohon isi angka hasil lari!', 'warning');
      } else if (tugasLower.includes("kesehatan")) {
        nilai = "";
      } else {
        nilai = document.getElementById("input-check-lolos").checked ? "Lolos" : "Tidak Lolos";
      }

      let btn = document.getElementById("btn-simpan");
      btn.innerHTML = `Menyimpan...`; btn.disabled = true;

      let res = await apiCall({
        action: "simpanNilai", noPeserta: pesertaSedangDinilai,
        kategori: tugas, nilaiUtama: nilai, nilaiCatatan: document.getElementById("input-catatan").value
      });

      if (res && res.success) {
        Swal.fire({ icon: 'success', title: 'Data Tersimpan!', timer: 1500, showConfirmButton: false });
        setTimeout(() => batal(), 1500);
      } else {
        Swal.fire('Gagal', res ? res.message : 'Error server.', 'error');
      }

      btn.innerHTML = `SIMPAN`; btn.disabled = false;
    }
  </script>
</body>
</html>
