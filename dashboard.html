<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Monitoring Tes Fisik PMB Politeknik Industri Petrokimia Banten</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .stat-card { background-color: #1e293b; border-radius: 15px; padding: 25px; border-left: 5px solid #3b82f6; }
    .stat-val { font-size: 3.5rem; font-weight: bold; margin: 0; }
  </style>
</head>
<body class="p-5">
  <div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-secondary pb-3">
    <h2><i class="bi bi-display"></i> Live Monitoring Tes Fisik PMB</h2>
    <span class="badge bg-success" id="indicator">Live (Updating 10s)</span>
  </div>

  <div class="row g-4 text-center">
    <div class="col-md-3">
      <div class="stat-card" style="border-color:#94a3b8;"><p class="text-muted fw-bold mb-1">TOTAL PESERTA</p><p class="stat-val" id="d-total">-</p></div>
    </div>
    <div class="col-md-3">
      <div class="stat-card" style="border-color:#eab308;"><p class="text-muted fw-bold mb-1">CHECK-IN HADIR</p><p class="stat-val text-warning" id="d-hadir">-</p></div>
    </div>
    <div class="col-md-3">
      <div class="stat-card" style="border-color:#3b82f6;"><p class="text-muted fw-bold mb-1">LOLOS VERIFIKASI</p><p class="stat-val text-primary" id="d-verif">-</p></div>
    </div>
    <div class="col-md-3">
      <div class="stat-card" style="border-color:#22c55e;"><p class="text-muted fw-bold mb-1">DIPERIKSA MEDIS</p><p class="stat-val text-success" id="d-medis">-</p></div>
    </div>
  </div>

  <script>
    const API_URL = "URL_APPS_SCRIPT_ANDA_DISINI";

    async function fetchStats() {
      document.getElementById("indicator").className = "badge bg-warning text-dark";
      document.getElementById("indicator").innerText = "Menarik Data...";
      try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "getDashboard" }) }).then(r=>r.json());
        if(res.success) {
          document.getElementById("d-total").innerText = res.data.total;
          document.getElementById("d-hadir").innerText = res.data.hadir;
          document.getElementById("d-verif").innerText = res.data.lolosVerif;
          document.getElementById("d-medis").innerText = res.data.lolosKesehatan;
        }
      } catch(e) {}
      document.getElementById("indicator").className = "badge bg-success";
      document.getElementById("indicator").innerText = "Live (Updating 10s)";
    }

    fetchStats();
    setInterval(fetchStats, 10000); // Tarik data setiap 10 detik
  </script>
</body>
</html>
