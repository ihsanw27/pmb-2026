<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Monitor Tes Fisik PMB PIPB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --bg-page: #e8eef2; --bg-card: #fdfdfd; --text-main: #334155; --text-muted: #64748b; --accent: #5b7cfa; --accent-soft: #edf2ff; --success: #38d9a9; --danger: #ff8787; --warning: #fcc419; --border-soft: #dce4ec; }
    body { background: var(--bg-page); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    .login-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card-login { background: var(--bg-card); border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(100,116,139,0.06); padding: 40px 30px; border: 1px solid #ffffff; width: 100%; max-width: 420px; }
    .campus-logo { max-height: 60px; width: auto; margin: 0 auto 25px auto; display: block; object-fit: contain; }
    .form-control { border-radius: 14px; padding: 14px 18px; border: 1.5px solid var(--border-soft); font-weight: 500; background: #f4f7f9; }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(91, 124, 250, 0.15); outline: none; background: #ffffff; }
    .input-group-text { border-radius: 14px; border: 1.5px solid var(--border-soft); background: #f4f7f9; color: var(--text-muted); }
    .btn-custom { border-radius: 14px; padding: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .btn-accent { background: var(--accent); color: white; border: none; box-shadow: 0 6px 15px rgba(91, 124, 250, 0.2); }
    .dashboard-wrapper { flex-grow: 1; padding: 20px; }
    .navbar-custom { background: var(--bg-card); border-radius: 20px; padding: 15px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffffff; }
    .stat-card { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 1px solid #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.03); height: 100%; display: flex; flex-direction: column; transition: all 0.3s ease; }
    .stat-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .stat-val { font-size: 3rem; font-weight: 800; line-height: 1; margin: 0; color: var(--text-main); }
    .progress { background-color: #edf2f7; border-radius: 50rem; overflow: hidden; }
    .table-container { background: var(--bg-card); border-radius: 20px; padding: 25px; border: 1px solid #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow-x: auto; }
    .table th { background-color: #f8fafc; color: var(--text-muted); font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid var(--border-soft); padding: 15px; }
    .table td { padding: 15px; vertical-align: middle; border-bottom: 1px solid var(--border-soft); font-size: 0.85rem; font-weight: 500; }
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .link-detail { transition: all 0.2s ease; cursor: pointer; text-decoration: none; }
    .link-detail:hover { opacity: 0.7; text-decoration: underline; }
    .photo-thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid var(--border-soft); margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="view-login" class="login-wrapper fade-in">
    <div class="card-login text-center">
      <img src="https://i.ibb.co.com/TDsSQQ6B/IMG-1501-removebg-preview.png" alt="Logo Kampus" class="campus-logo">
      <h4 class="fw-bold mb-1">Portal Dashboard</h4>
      <p class="small mb-4 fw-medium text-muted">Dashboard Monitor Tes Fisik PMB PIPB</p>
      <div class="input-group mb-3"><span class="input-group-text"><i class="bi bi-envelope"></i></span><input type="email" id="email" class="form-control" placeholder="Email Terdaftar"></div>
      <div class="input-group mb-4"><span class="input-group-text"><i class="bi bi-key"></i></span><input type="password" id="kode" class="form-control" placeholder="Kode Keamanan"></div>
      <button onclick="login()" class="btn btn-custom btn-accent w-100" id="btn-login"><i class="bi bi-shield-lock" id="l-icon"></i> <span id="l-text">MASUK DASHBOARD</span></button>
    </div>
  </div>

  <div id="view-dashboard" class="dashboard-wrapper hidden fade-in">
    <div class="navbar-custom container-fluid">
      <div class="d-flex align-items-center gap-3">
        <h5 class="mb-0 fw-bold">Monitor Tes Fisik PMB</h5>
      </div>
      <div class="d-flex align-items-center gap-3">
        <div class="text-end d-none d-md-block">
          <small class="text-muted d-block">LOGIN SEBAGAI</small>
          <strong id="admin-nama" class="fs-6 text-primary">Nama Panitia</strong>
        </div>
        <button onclick="loadData()" id="btn-refresh" class="btn btn-light rounded-circle border"><i class="bi bi-arrow-clockwise"></i></button>
        <button onclick="logout()" class="btn btn-light rounded-circle border text-danger"><i class="bi bi-power"></i></button>
      </div>
    </div>

    <div class="container-fluid mb-4">
      <div class="row g-4">
        <div class="col-12">
           <div class="stat-card">
              <div class="stat-title text-primary"><i class="bi bi-people-fill"></i> Total Check-in Kehadiran</div>
              <div class="d-flex justify-content-between align-items-end">
                <h2 class="fw-bold mb-0"><span id="d-hadir">0</span> / <span id="d-total">0</span></h2>
                <div class="fw-bold fs-4 text-primary"><span id="d-persen">0</span>%</div>
              </div>
              <div class="progress mt-3" style="height: 12px;"><div id="bar-hadir" class="progress-bar bg-primary" style="width: 0%"></div></div>
           </div>
        </div>
      </div>
    </div>

    <div class="container-fluid">
      <div class="table-container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
          <div>
            <h5 class="fw-bold mb-1">Live Rekapitulasi Penilaian</h5>
            <span class="badge bg-light text-muted border">
              <i class="bi bi-broadcast text-primary"></i> Refresh dalam <strong id="timer-text" class="text-primary">30</strong> detik
            </span>
          </div>
          <div class="input-group" style="max-width: 300px;">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Cari Nama..." onkeyup="filterTable()">
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>NO PESERTA</th>
                <th>NAMA & DETAIL</th>
                <th>VERIF ADM</th>
                <th class="text-center">TES LARI</th>
                <th class="text-center">KETINGGIAN</th>
                <th class="text-center">RUANG SEMPIT</th>
                <th>KONDISI P3K</th>
              </tr>
            </thead>
            <tbody id="tbody-peserta">
              <tr><td colspan="7" class="text-center text-muted py-4">Memuat data...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec"; 
    let countdownInterval, secondsLeft = 30;

    window.onload = () => { if(localStorage.getItem("dashSess")) restoreSession(); };

    async function api(payload) {
      try { 
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); 
        return JSON.parse(await res.text()); 
      } catch(e) { return { success: false }; }
    }

    async function login() {
      let email = document.getElementById("email").value, kode = document.getElementById("kode").value;
      let res = await api({ action: "login", email, kodeLogin: kode });
      if(res.success) {
        localStorage.setItem("dashSess", JSON.stringify({ nama: res.nama }));
        restoreSession();
      } else { Swal.fire('Gagal', res.message, 'error'); }
    }

    function restoreSession() {
      let sess = JSON.parse(localStorage.getItem("dashSess"));
      document.getElementById("view-login").classList.add("hidden"); 
      document.getElementById("view-dashboard").classList.remove("hidden");
      document.getElementById("admin-nama").innerText = sess.nama;
      loadData();
      startCountdown();
    }

    function logout() { localStorage.removeItem("dashSess"); location.reload(); }

    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      secondsLeft = 30;
      countdownInterval = setInterval(() => {
        secondsLeft--;
        if (secondsLeft <= 0) { loadData(false); secondsLeft = 30; }
        document.getElementById("timer-text").innerText = secondsLeft;
      }, 1000);
    }

    async function loadData(showToast = true) {
      let res = await api({ action: "getDashboard" });
      if (res.success) {
        updateStats(res.stats);
        renderTable(res.data);
        if(showToast) Swal.fire({title:'Updated', timer:800, toast:true, position:'top-end', showConfirmButton:false, icon:'success'});
      }
    }

    function updateStats(s) {
      document.getElementById("d-total").innerText = s.total;
      document.getElementById("d-hadir").innerText = s.hadir;
      document.getElementById("d-persen").innerText = s.persentaseHadir;
      document.getElementById("bar-hadir").style.width = s.persentaseHadir + "%";
    }

    // FUNGSI UNTUK MENAMPILKAN MODAL BIODATA LENGKAP
    function showBiodata(p) {
      let fotoHtml = p.foto ? `<img src="${p.foto}" class="photo-thumb shadow-sm">` : `<div class="photo-thumb bg-light d-flex align-items-center justify-content-center mx-auto"><i class="bi bi-person text-muted fs-1"></i></div>`;
      
      Swal.fire({
        title: 'Profil Peserta',
        html: `
          <div class="text-center mb-3">${fotoHtml}</div>
          <div class="text-start small">
            <table class="table table-sm table-borderless">
              <tr><td width="100" class="fw-bold">No Peserta</td><td>: ${p.no}</td></tr>
              <tr><td class="fw-bold">NIK</td><td>: ${p.nik || '-'}</td></tr>
              <tr><td class="fw-bold">Nama</td><td>: ${p.nama}</td></tr>
              <tr><td class="fw-bold">Gender</td><td>: ${p.jenis_kelamin || '-'}</td></tr>
              <tr><td class="fw-bold">Jalur</td><td>: ${p.jalur}</td></tr>
              <tr class="border-top"><td colspan="2" class="pt-2 fw-bold text-primary">Pilihan Jurusan:</td></tr>
              <tr><td class="fw-bold">Jurusan 1</td><td>: ${p.jurusan_1 || '-'}</td></tr>
              <tr><td class="fw-bold">Jurusan 2</td><td>: ${p.jurusan_2 || '-'}</td></tr>
            </table>
          </div>
        `,
        confirmButtonText: 'Tutup',
        confirmButtonColor: '#5b7cfa'
      });
    }

    function renderTable(data) {
      let tbody = document.getElementById("tbody-peserta");
      tbody.innerHTML = "";
      data.forEach(p => {
        // Konversi objek p ke string agar bisa dikirim ke fungsi onclick
        let pStr = JSON.stringify(p).replace(/"/g, '&quot;');
        
        tbody.innerHTML += `
          <tr class="peserta-row">
            <td class="fw-bold text-muted">${p.no}</td>
            <td>
              <div class="fw-bold">${p.nama}</div>
              <div class="d-flex gap-2 align-items-center mt-1">
                <span class="badge bg-light text-dark border fw-normal" style="font-size:0.7rem;">${p.jalur}</span>
                <a onclick='showBiodata(${pStr})' class="text-primary link-detail fw-bold" style="font-size:0.75rem;">
                  <i class="bi bi-person-lines-fill"></i> Detail Biodata
                </a>
              </div>
            </td>
            <td><span class="badge ${p.verif === 'Lolos' ? 'bg-success' : (p.verif === 'Tidak Lolos' ? 'bg-danger' : 'bg-secondary')}">${p.verif || 'Pending'}</span></td>
            <td class="text-center fw-bold">${p.lari || '-'}</td>
            <td class="text-center"><span class="badge ${p.tinggi === 'Lolos' ? 'bg-success' : (p.tinggi === 'Tidak Lolos' ? 'bg-danger' : 'bg-secondary')}">${p.tinggi || 'Pending'}</span></td>
            <td class="text-center"><span class="badge ${p.sempit === 'Lolos' ? 'bg-success' : (p.sempit === 'Tidak Lolos' ? 'bg-danger' : 'bg-secondary')}">${p.sempit || 'Pending'}</span></td>
            <td>${p.medis ? '<span class="badge bg-danger">P3K</span>' : '<span class="badge bg-success">Aman</span>'}</td>
          </tr>
        `;
      });
    }

    function filterTable() {
      let input = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll(".peserta-row").forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(input) ? "" : "none";
      });
    }
  </script>
</body>
</html>
