<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Penilaian PMB</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: sans-serif; }
    .hidden { display: none !important; }
    .card-box { max-width: 500px; margin: 30px auto; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; background: white;}
    #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid #0d6efd;}
    #reader video { object-fit: cover; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h1 fw-bold">PMB Poltek Petrokimia</span>
    </div>
  </nav>

  <div class="container mt-4 text-center">
    
    <div id="view-login" class="card-box mt-4">
      <h5 class="fw-bold text-dark mb-1">Login Panitia</h5>
      <p class="text-muted small mb-4">Masukkan Email dan Kode Akses untuk bertugas</p>
      
      <input type="email" id="email-login" class="form-control form-control-lg mb-3" placeholder="Alamat Email">
      
      <input type="text" id="kode-login" class="form-control form-control-lg mb-4 text-center fw-bold" 
             placeholder="Kode Akses (Contoh: LARI01)" style="text-transform: uppercase;">
             
      <button onclick="login()" class="btn btn-primary btn-lg w-100 fw-bold" id="btn-login">MASUK SISTEM</button>
    </div>

    <div id="view-dashboard" class="hidden text-start mx-auto" style="max-width: 500px;">
      
      <div class="alert alert-info shadow-sm mt-2">
        <strong>Petugas: </strong> <span id="nama-panitia" class="fw-bold"></span><br>
        <strong>Pos Tes: </strong> 
        <select id="pilih-tugas" class="form-select border-primary mt-1 fw-bold text-primary"></select>
      </div>

      <div class="card shadow-sm p-3 mb-4 border-primary">
        <h5 class="text-center fw-bold mb-3">Kamera Scanner QR</h5>
        <div id="reader" class="mb-3"></div>
        <p class="text-center text-muted small mb-0">Arahkan kamera ke QR Code milik Peserta.</p>
        <button onclick="nyalakanKamera()" class="btn btn-outline-primary btn-sm mt-2 hidden" id="btn-restart-cam">Mulai Ulang Kamera</button>
      </div>

      <div id="form-nilai" class="card shadow-sm border-success p-3 hidden mb-5">
        <div class="alert alert-success p-2 mb-3 text-center">
          <small class="d-block text-muted">Peserta Dinilai:</small>
          <h5 id="nama-peserta" class="fw-bold mb-0 text-dark"></h5>
        </div>
        
        <label class="form-label small fw-bold text-muted">Hasil / Nilai Utama:</label>
        <input type="text" id="input-nilai" class="form-control mb-3" placeholder="Contoh: Lolos / 12 Menit">
        
        <label class="form-label small fw-bold text-muted">Catatan Tambahan:</label>
        <textarea id="input-catatan" class="form-control mb-3" rows="2" placeholder="Opsional..."></textarea>
        
        <div class="d-flex gap-2">
          <button onclick="batal()" class="btn btn-secondary w-25 fw-bold">BATAL</button>
          <button onclick="simpan()" class="btn btn-success w-75 fw-bold" id="btn-simpan">SIMPAN DATA</button>
        </div>
      </div>
      
    </div>
  </div>

  <script>
    // ==========================================
    // MASUKKAN URL API GOOGLE SCRIPT ANDA DI SINI!
    // ==========================================
    const API_URL = "https://script.google.com/macros/library/d/1xmrw3jlYW0MV_e741rWt5F7pLLVSv0ez44r3JZ-xJs5IRZaJ1RwGCSoJ/12";
    
    let html5QrcodeScanner;
    let pesertaSedangDinilai = "";
    let dataHadir = []; 

    async function kirimKeExcel(data) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(data)
        });
        return await response.json();
      } catch (e) {
        alert("Koneksi gagal. Pastikan internet Anda stabil.");
        return null;
      }
    }

    // 1. PROSES LOGIN (DENGAN EMAIL + KODE)
    async function login() {
      let email = document.getElementById("email-login").value;
      let kode = document.getElementById("kode-login").value;
      
      if(!email || !kode) return alert("Harap isi Email dan Kode Login Anda!");
      
      document.getElementById("btn-login").innerText = "Memverifikasi...";
      
      let res = await kirimKeExcel({ 
        action: "login", 
        email: email, 
        kodeLogin: kode.toUpperCase() 
      });
      
      if(res && res.success) {
        document.getElementById("view-login").classList.add("hidden");
        document.getElementById("view-dashboard").classList.remove("hidden");
        document.getElementById("nama-panitia").innerText = res.nama;
        
        let select = document.getElementById("pilih-tugas");
        select.innerHTML = "";
        res.kategoriList.forEach(t => select.innerHTML += `<option value="${t}">${t}</option>`);

        document.getElementById("nama-panitia").innerText += " (Memuat Data...)";
        let resHadir = await kirimKeExcel({ action: "getHadir" });
        if(resHadir.success) {
          dataHadir = resHadir.data;
          document.getElementById("nama-panitia").innerText = res.nama; 
        }

        nyalakanKamera();
      } else {
        alert(res.message || "Gagal Login. Periksa kembali Email dan Kode Anda.");
        document.getElementById("btn-login").innerText = "MASUK SISTEM";
      }
    }

    // 2. PROSES SCANNER KAMERA LIVE
    function nyalakanKamera() {
      document.getElementById("btn-restart-cam").classList.add("hidden");
      
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, 
        qrbox: {width: 250, height: 250},
        aspectRatio: 1.0,
        disableFlip: false 
      }, false);
      
      html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText) {
      html5QrcodeScanner.pause(true); 
      
      let peserta = dataHadir.find(p => p.no_peserta.toString() === decodedText.toString());
      
      if(peserta) {
        pesertaSedangDinilai = decodedText;
        document.getElementById("nama-peserta").innerText = `${peserta.nama} (${decodedText})`;
        
        document.getElementById("input-nilai").value = "";
        document.getElementById("input-catatan").value = "";
        document.getElementById("form-nilai").classList.remove("hidden");
        document.getElementById("form-nilai").scrollIntoView({ behavior: "smooth" });
      } else {
        alert("Nomor " + decodedText + " belum Check-In di depan atau format QR salah!");
        setTimeout(() => html5QrcodeScanner.resume(), 1500); 
      }
    }

    function onScanFailure(error) {}

    // 3. BATAL & SIMPAN
    function batal() {
      document.getElementById("form-nilai").classList.add("hidden");
      pesertaSedangDinilai = "";
      html5QrcodeScanner.resume(); 
    }

    async function simpan() {
      let nilai = document.getElementById("input-nilai").value;
      if(!nilai) return alert("Harap isi Hasil/Nilai Utama!");

      document.getElementById("btn-simpan").innerText = "Menyimpan...";
      
      let payload = {
        action: "simpanNilai",
        noPeserta: pesertaSedangDinilai,
        kategori: document.getElementById("pilih-tugas").value,
        nilaiUtama: nilai,
        nilaiCatatan: document.getElementById("input-catatan").value
      };

      let res = await kirimKeExcel(payload);
      
      if(res && res.success) {
        alert("Data Berhasil Disimpan ke Excel!");
        document.getElementById("form-nilai").classList.add("hidden");
        html5QrcodeScanner.resume(); 
      } else {
        alert("Gagal menyimpan ke Excel. Cek koneksi Anda.");
      }
      document.getElementById("btn-simpan").innerText = "SIMPAN DATA";
    }
  </script>
</body>
</html>
