<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Check-in Peserta PMB PIPB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    /* SOFT PASTEL THEME */
    :root { 
      --bg-page: #e8eef2; 
      --bg-card: #fdfdfd; 
      --text-main: #334155; 
      --text-muted: #64748b;
      --accent: #5b7cfa; 
      --accent-hover: #4c6ef5;
      --success: #38d9a9;
      --border-soft: #dce4ec;
    }
    
    body { background: var(--bg-page); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    
    .kiosk-container { background: var(--bg-card); border-radius: 28px; padding: 40px 30px; box-shadow: 0 20px 40px -10px rgba(100,116,139,0.1); width: 100%; max-width: 420px; text-align: center; border: 1px solid #ffffff; }
    
    .campus-logo { max-height: 65px; width: auto; margin: 0 auto 20px auto; display: block; object-fit: contain; }
    
    .form-control { border-radius: 16px; padding: 16px; border: 1.5px solid var(--border-soft); background: #f4f7f9; font-size: 1.1rem; text-align: center; font-weight: 600; color: var(--text-main); transition: all 0.3s; }
    .form-control::placeholder { color: #94a3b8; font-weight: 500; font-size: 0.95rem; }
    .form-control:focus { background-color: #ffffff; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(91, 124, 250, 0.15); outline: none; }
    
    .btn-custom { border-radius: 16px; padding: 16px; font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; cursor: pointer; }
    .btn-accent { background-color: var(--accent); color: white; border: none; box-shadow: 0 8px 16px rgba(91, 124, 250, 0.2); }
    .btn-accent:hover { background-color: var(--accent-hover); color: white; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(91, 124, 250, 0.25); }
    .btn-accent:disabled { background-color: #a0aec0; box-shadow: none; transform: none; }
    
    /* Styling Scanner Kamera */
    #reader { border-radius: 20px; overflow: hidden; border: 3px solid var(--border-soft); background: #334155; min-height: 250px; margin-bottom: 20px; }
    #reader video { border-radius: 16px; object-fit: cover; }
    
    /* Styling Profil Sukses */
    .foto-profil { width: 120px; height: 120px; object-fit: cover; border: 5px solid #edf2ff; }
    .avatar-placeholder { width: 120px; height: 120px; background: #edf2ff; color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin: 0 auto; }
    
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="kiosk-container fade-in">
    
    <div id="view-form">
      <img src="https://i.ibb.co.com/TDsSQQ6B/IMG-1501-removebg-preview.png" alt="Logo Kampus" class="campus-logo">
      
      <h3 class="fw-bold mb-2" style="color: var(--text-main);">Check-In Peserta</h3>
      <p class="small mb-3 fw-medium" style="color: var(--text-muted);">Silakan scan QR dari Kartu Ujian Anda.</p>
      
      <div id="reader" class="shadow-sm"></div>
      <button onclick="initCam()" class="btn btn-light btn-custom w-100 border hidden mb-3" id="btn-cam" style="color: var(--text-muted); font-size: 0.9rem;">Izinkan Akses Kamera</button>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1" style="border-color: var(--border-soft);">
        <span class="px-3 small fw-bold text-muted" style="font-size: 0.7rem;">ATAU KETIK MANUAL</span>
        <hr class="flex-grow-1" style="border-color: var(--border-soft);">
      </div>

      <div class="mb-3">
        <input type="text" id="noPeserta" class="form-control" placeholder="Masukkan Nomor Peserta..." autocomplete="off">
      </div>
      
      <button onclick="prosesManual()" class="btn btn-custom btn-accent w-100" id="btn-checkin">
        <i class="bi bi-box-arrow-in-right"></i> Verifikasi & Check-in
      </button>
    </div>

    <div id="view-confirm" class="hidden fade-in">
      <div class="mb-4">
        <i class="bi bi-qr-code-scan" style="font-size: 3.5rem; color: var(--accent);"></i>
      </div>
      <h4 class="fw-bold mb-1">QR Terdeteksi</h4>
      <p class="small mb-4 text-muted">Apakah nomor di bawah ini sudah benar?</p>
      
      <div class="p-3 rounded-4 mb-4" style="background: #f8fafc; border: 2px dashed var(--accent);">
        <h2 class="fw-bold mb-0" id="display-scanned-id" style="color: var(--accent); letter-spacing: 1px;">-</h2>
      </div>

      <div class="d-grid gap-2">
        <button onclick="doCheckIn(tempID)" class="btn btn-custom btn-accent w-100" id="btn-confirm-final">
            <i class="bi bi-check2-circle"></i> Konfirmasi & Check-in
        </button>
        <button onclick="resetLayar()" class="btn btn-link text-decoration-none fw-bold" style="color: var(--text-muted);">
            Batal / Scan Ulang
        </button>
      </div>
    </div>

    <div id="view-success" class="hidden fade-in">
      <div class="mb-3 mt-2">
        <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: var(--success); text-shadow: 0 10px 20px rgba(56, 217, 169, 0.3);"></i>
      </div>
      <h4 class="fw-bold mb-1" style="color: var(--success);">Check-In Berhasil!</h4>
      <p class="small mb-4" style="color: var(--text-muted);">
        Silakan menuju ke pos pemeriksaan selanjutnya.<br>
        <strong style="color: var(--accent); display: inline-block; margin-top: 6px;">Harap tunjukkan kartu ujian ke panitia atau tim kesehatan.</strong>
      </p>
      
      <div class="p-4 rounded-4 mb-4" style="background: #f8fafc; border: 1.5px solid var(--border-soft);">
        <img id="qr-foto" src="" class="rounded-circle shadow-sm mb-3 foto-profil hidden" alt="Foto Peserta">
        <div id="qr-avatar" class="avatar-placeholder mb-3 hidden"><i class="bi bi-person-fill"></i></div>
        
        <h5 class="fw-bold mb-1" id="qr-nama" style="color: var(--text-main);">Nama Peserta</h5>
        <span class="badge rounded-pill mt-1 px-3 py-2 fw-semibold shadow-sm" style="background-color: #edf2ff; color: var(--accent); font-size: 0.9rem; border: 1px solid #dbe4ff;" id="qr-no-peserta">-</span>
      </div>
      
      <button onclick="resetLayar()" class="btn btn-light fw-bold w-100 rounded-pill py-3" style="color: var(--text-main); background: #ffffff; border: 2px solid var(--border-soft); box-shadow: 0 4px 6px rgba(0,0,0,0.02);">
        <i class="bi bi-arrow-left me-1"></i> Kembali
      </button>
    </div>

  </div>

  <script>
    // MASUKKAN URL GOOGLE APPS SCRIPT DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec"; 
    
    let qrScanner;
    let isScanningPaused = false;
    let tempID = ""; // Variabel penampung hasil scan sebelum konfirmasi

    window.onload = () => {
      qrScanner = new Html5Qrcode("reader");
      initCam();
    };

    function initCam() {
      document.getElementById("btn-cam").classList.add("hidden");
      isScanningPaused = false;
      qrScanner.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 250 } }, 
        onScan, 
        () => {} 
      ).catch(() => { 
        document.getElementById("btn-cam").classList.remove("hidden"); 
      });
    }

    // Fungsi saat kamera berhasil membaca QR
    function onScan(txt) {
      if (isScanningPaused) return; 
      
      let rawText = txt.toString().trim();
      
      // PENGAMAN (SAFEGUARD) POLA QR CODE
      // Harus memiliki pola: [Angka]-[Angka]-[Teks Bebas]
      // Contoh valid: 2026100008-2026100043-KIEZA ADITYA
      let isCardPattern = /^\d+-\d+-.+$/.test(rawText);
      
      if (!isCardPattern) {
        isScanningPaused = true;
        Swal.fire({
          icon: 'error', 
          title: 'QR Code Ditolak!', 
          text: 'Harap scan QR Code dari Kartu Ujian PMB yang resmi.', 
          confirmButtonColor: '#5b7cfa'
        }).then(() => {
          isScanningPaused = false;
        });
        return;
      }

      isScanningPaused = true; 
      // Ambil ID Part pertama (sebelum tanda -)
      tempID = rawText.split('-')[0].toLowerCase();
      
      // Tampilkan Layar Konfirmasi
      document.getElementById("display-scanned-id").innerText = tempID.toUpperCase();
      document.getElementById("view-form").classList.add("hidden");
      document.getElementById("view-confirm").classList.remove("hidden");
    }

    function prosesManual() {
      let valRaw = document.getElementById("noPeserta").value.trim();
      if (!valRaw) return Swal.fire({icon: 'warning', text: 'Masukkan nomor peserta.', confirmButtonColor: '#5b7cfa'});
      
      // PENGAMAN (SAFEGUARD) INPUT MANUAL ATAU PISTOL SCANNER
      let isCardPattern = /^\d+-\d+-.+$/.test(valRaw); // Jika pakai pistol scanner
      let isNumberOnly = /^[a-zA-Z0-9]+$/.test(valRaw); // Jika diketik manual polos
      
      if (!isCardPattern && !isNumberOnly) {
         return Swal.fire({
            icon: 'error', 
            title: 'Format Tidak Dikenali', 
            text: 'Harap ketik Nomor Peserta saja, atau scan langsung Kartu Ujian PMB.', 
            confirmButtonColor: '#5b7cfa'
         });
      }

      let noInput = valRaw.split('-')[0].toLowerCase();
      doCheckIn(noInput);
    }

    async function doCheckIn(noInput) {
      // Handle Button State
      let btnConfirm = document.getElementById("btn-confirm-final");
      let btnManual = document.getElementById("btn-checkin");
      
      btnConfirm.disabled = true; btnManual.disabled = true;
      btnConfirm.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Memproses...`;

      try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "checkIn", noPeserta: noInput }) });
        let json = JSON.parse(await res.text());

        if (json.success) {
          tampilkanSukses(noInput, json.nama, json.foto);
        } else {
          Swal.fire({icon: 'error', title: 'Gagal', text: json.message, confirmButtonColor: '#5b7cfa'}).then(() => {
            resetLayar();
          });
        }
      } catch(e) { 
        Swal.fire({icon: 'error', text: 'Koneksi Terputus.', confirmButtonColor: '#5b7cfa'}).then(() => {
            resetLayar();
        }); 
      }

      btnConfirm.disabled = false;
      btnConfirm.innerHTML = `<i class="bi bi-check2-circle"></i> Konfirmasi & Check-in`;
      btnManual.disabled = false;
    }

    function tampilkanSukses(nomor, namaPeserta, linkFoto) {
      document.getElementById("view-form").classList.add("hidden"); 
      document.getElementById("view-confirm").classList.add("hidden"); 
      document.getElementById("view-success").classList.remove("hidden");
      
      document.getElementById("qr-no-peserta").innerText = nomor.toUpperCase();
      document.getElementById("qr-nama").innerText = namaPeserta ? namaPeserta : "Nama Tidak Terdaftar";

      let elFoto = document.getElementById("qr-foto"), elAvatar = document.getElementById("qr-avatar");
      if (linkFoto && linkFoto.startsWith("http")) {
        elFoto.src = linkFoto; 
        elFoto.classList.remove("hidden"); 
        elAvatar.classList.add("hidden");
      } else {
        elFoto.classList.add("hidden"); 
        elAvatar.classList.remove("hidden");
      }
    }

    function resetLayar() {
      tempID = "";
      document.getElementById("noPeserta").value = ""; 
      document.getElementById("qr-foto").src = "";
      
      // Sembunyikan semua layar kecuali Form Utama
      document.getElementById("view-success").classList.add("hidden"); 
      document.getElementById("view-confirm").classList.add("hidden"); 
      document.getElementById("view-form").classList.remove("hidden");
      
      document.getElementById("noPeserta").focus();
      isScanningPaused = false; 
    }
  </script>
</body>
</html>
