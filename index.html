<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Peserta Tes Fisik PMB PIPB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    /* SOFT LIGHT BLUE THEME FOR PARTICIPANTS */
    :root {
      --bg-page: #f0f9ff; /* Very soft sky blue page */
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --accent: #38bdf8; /* Soft Sky Blue */
    }

    body { background-color: var(--bg-page); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    .kiosk-container { background: var(--bg-card); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; border: 1px solid #e0f2fe; }
    .kiosk-title { font-weight: 800; font-size: 2rem; letter-spacing: -1px; margin-bottom: 5px; color: var(--accent); }
    
    .form-control { border-radius: 12px; padding: 15px; border: 1px solid #cbd5e1; background: #f8fafc; font-size: 1.1rem; text-align: center; font-weight: 600; }
    .form-control:focus { background-color: #fff; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); outline: none; }
    
    .btn-custom { border-radius: 14px; padding: 15px; font-weight: 700; font-size: 1rem; transition: all 0.2s ease; letter-spacing: 0.5px; }
    .btn-indigo { background-color: var(--accent); color: white; border: none; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2); }
    .btn-indigo:hover { background-color: #0ea5e9; color: white; transform: translateY(-1px); }
    .btn-indigo:active { transform: translateY(1px); box-shadow: none; }

    .qr-wrapper { background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 20px; padding: 20px; display: inline-block; margin: 20px 0; }
    #qrcode-box img { margin: 0 auto; border-radius: 8px; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="kiosk-container">
    
    <div id="view-form">
      <div class="text-primary mb-3"><i class="bi bi-person-vcard-fill" style="font-size: 3.5rem;"></i></div>
      <h1 class="kiosk-title">Portal Peserta Tes Fisik PMB PIPB</h1>
      <p class="text-muted fs-6 mb-4">Silakan masukkan Nomor Peserta/Registrasi Anda.</p>
      
      <div class="mb-4 text-start">
        <label class="form-label small fw-bold text-muted ps-1">NOMOR PESERTA</label>
        <input type="text" id="noPeserta" class="form-control text-primary" placeholder="Contoh: PMB001" autocomplete="off">
      </div>
      
      <button onclick="doCheckIn()" class="btn btn-custom btn-indigo w-100" id="btn-checkin">
        <i class="bi bi-qr-code me-2"></i>Check-in & Dapatkan ID
      </button>
    </div>

    <div id="view-qr" class="hidden">
      <div class="mb-2 text-success">
        <i class="bi bi-check-circle-fill" style="font-size: 3.5rem;"></i>
      </div>
      <h4 class="fw-bold mb-1 text-success">Check-in Berhasil!</h4>
      <p class="text-muted small mb-0">Tunjukkan QR Code ini kepada panitia tes.</p>
      
      <div class="qr-wrapper shadow-sm">
        <div id="qrcode-box"></div>
      </div>
      
      <div class="bg-light rounded-3 py-3 mb-4 border">
        <small class="text-muted fw-bold d-block mb-1">ID PESERTA ANDA</small>
        <h4 class="text-primary fw-bold mb-0" id="qr-no-peserta">-</h4>
      </div>
      
      <p class="text-rose small fw-bold mb-4">
        <i class="bi bi-exclamation-triangle-fill me-1"></i> Jangan tutup halaman ini selama mengikuti tes.
      </p>

      <button onclick="resetLayar()" class="btn btn-light text-secondary fw-bold w-100 rounded-pill border">
        Kembali / Keluar
      </button>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec"; // PASTIKAN MENGISI URL INI
    let qrcode = null;

    async function doCheckIn() {
      const noInput = document.getElementById("noPeserta").value.trim();
      const btn = document.getElementById("btn-checkin");
      
      if (!noInput) {
        return Swal.fire({icon: 'warning', title: 'Oops!', text: 'Mohon masukkan nomor peserta Anda.'});
      }

      btn.disabled = true; btn.innerHTML = '<div class="spinner-border spinner-border-sm me-2"></span>Memproses...';

      try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "checkIn", noPeserta: noInput }) });
        let json = JSON.parse(await res.text());

        if (json.success) {
          tampilkanQR(noInput);
        } else {
          Swal.fire({icon: 'error', title: 'Gagal', text: json.message || "Data tidak ditemukan."});
        }
      } catch(e) {
        Swal.fire({icon: 'error', title: 'Koneksi Terputus', text: 'Cek koneksi internet Anda.'});
      }

      btn.disabled = false; btn.innerHTML = '<i class="bi bi-qr-code me-2"></i>Check-in & Dapatkan ID';
    }

    function tampilkanQR(nomor) {
      // Pindah Layar
      document.getElementById("view-form").classList.add("hidden");
      document.getElementById("view-qr").classList.remove("hidden");
      
      // Set Text
      document.getElementById("qr-no-peserta").innerText = nomor;

      // Generate QR Menggunakan QRCode.js
      document.getElementById("qrcode-box").innerHTML = ""; // Bersihkan QR sebelumnya
      qrcode = new QRCode(document.getElementById("qrcode-box"), {
        text: nomor,
        width: 220,
        height: 220,
        colorDark : "#1e293b", // Warna Slate
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });
    }

    function resetLayar() {
      document.getElementById("noPeserta").value = "";
      document.getElementById("view-qr").classList.add("hidden");
      document.getElementById("view-form").classList.remove("hidden");
    }
  </script>
</body>
</html>
