<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Peserta PMB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --bg-page: #f8fafc; 
      --bg-card: #ffffff;
      --text-main: #0f172a;
      --accent: #0ea5e9; /* Light Blue Premium */
      --accent-hover: #0284c7;
    }

    body { background-color: var(--bg-page); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    
    .kiosk-container { background: var(--bg-card); border-radius: 28px; padding: 45px 35px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); width: 100%; max-width: 460px; text-align: center; border: 1px solid rgba(226, 232, 240, 0.8); }
    .kiosk-title { font-weight: 800; font-size: 2.1rem; letter-spacing: -1px; margin-bottom: 8px; color: var(--text-main); }
    
    .icon-wrapper { width: 80px; height: 80px; background: #e0f2fe; color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 20px auto; }
    
    .form-control { border-radius: 16px; padding: 18px; border: 1.5px solid #cbd5e1; background: #f8fafc; font-size: 1.15rem; text-align: center; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: 1px; color: var(--text-main); }
    .form-control::placeholder { color: #94a3b8; font-weight: 500; letter-spacing: 0; }
    .form-control:focus { background-color: #fff; border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.15); outline: none; transform: translateY(-2px); }
    
    .btn-custom { border-radius: 16px; padding: 18px; font-weight: 700; font-size: 1.05rem; transition: all 0.3s ease; letter-spacing: 0.5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-accent { background-color: var(--accent); color: white; border: none; box-shadow: 0 8px 20px rgba(14, 165, 233, 0.25); }
    .btn-accent:hover { background-color: var(--accent-hover); color: white; transform: translateY(-2px); box-shadow: 0 12px 25px rgba(14, 165, 233, 0.35); }
    .btn-accent:active { transform: translateY(1px); box-shadow: none; }
    .btn-accent:disabled { background-color: #94a3b8; box-shadow: none; transform: none; cursor: not-allowed; }

    .qr-wrapper { background: #ffffff; border: 2px dashed #bae6fd; border-radius: 24px; padding: 25px; display: inline-block; margin: 25px 0; box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); }
    #qrcode-box img { margin: 0 auto; border-radius: 12px; }
    
    .hidden { display: none !important; }
    
    /* Animasi Halus */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body>

  <div class="kiosk-container fade-up">
    
    <div id="view-form">
      <div class="icon-wrapper"><i class="bi bi-person-vcard"></i></div>
      <h1 class="kiosk-title">Portal Peserta</h1>
      <p class="text-muted fs-6 mb-4 fw-medium">Silakan masukkan Nomor Registrasi Anda.</p>
      
      <div class="mb-4">
        <label class="form-label small fw-bold text-muted d-block text-start ps-2 mb-2">NOMOR PESERTA</label>
        <input type="text" id="noPeserta" class="form-control" placeholder="Contoh: PMB-001" autocomplete="off">
      </div>
      
      <button onclick="doCheckIn()" class="btn btn-custom btn-accent w-100" id="btn-checkin">
        <i class="bi bi-qr-code" id="btn-icon"></i> <span id="btn-text">Dapatkan QR ID</span>
      </button>
    </div>

    <div id="view-qr" class="hidden fade-up">
      <div class="mb-3 text-success">
        <i class="bi bi-check-circle-fill" style="font-size: 4rem;"></i>
      </div>
      <h3 class="fw-bold mb-2 text-success">Berhasil!</h3>
      <p class="text-muted small fw-medium mb-0">Tunjukkan QR Code ini kepada panitia saat tes.</p>
      
      <div class="qr-wrapper">
        <div id="qrcode-box"></div>
      </div>
      
      <div class="bg-page rounded-4 py-3 mb-4" style="background-color: #f1f5f9;">
        <small class="text-muted fw-bold d-block mb-1">ID PESERTA</small>
        <h3 class="text-main fw-bold mb-0 letter-spacing-1" id="qr-no-peserta">-</h3>
      </div>

      <button onclick="resetLayar()" class="btn btn-light text-secondary fw-bold w-100 rounded-pill border py-3">
        Selesai / Keluar
      </button>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec"; 
    let qrcode = null;

    async function doCheckIn() {
      const noInput = document.getElementById("noPeserta").value.trim();
      const btn = document.getElementById("btn-checkin");
      const bIcon = document.getElementById("btn-icon");
      const bText = document.getElementById("btn-text");
      
      if (!noInput) return Swal.fire({icon: 'warning', title: 'Kosong', text: 'Masukkan nomor peserta Anda.', confirmButtonColor: '#0ea5e9'});

      // Loading State (Bebas Bug!)
      btn.disabled = true; 
      bIcon.className = "spinner-border spinner-border-sm"; 
      bText.innerText = "Memproses...";

      try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "checkIn", noPeserta: noInput }) });
        let json = JSON.parse(await res.text());

        if (json.success) {
          tampilkanQR(noInput);
        } else {
          Swal.fire({icon: 'error', title: 'Gagal', text: json.message || "Data tidak ditemukan.", confirmButtonColor: '#0ea5e9'});
        }
      } catch(e) {
        Swal.fire({icon: 'error', title: 'Koneksi Terputus', text: 'Cek koneksi internet Anda.', confirmButtonColor: '#0ea5e9'});
      }

      // Reset State
      btn.disabled = false; 
      bIcon.className = "bi bi-qr-code"; 
      bText.innerText = "Dapatkan QR ID";
    }

    function tampilkanQR(nomor) {
      document.getElementById("view-form").classList.add("hidden");
      document.getElementById("view-qr").classList.remove("hidden");
      document.getElementById("qr-no-peserta").innerText = nomor;

      document.getElementById("qrcode-box").innerHTML = ""; 
      qrcode = new QRCode(document.getElementById("qrcode-box"), {
        text: nomor,
        width: 200,
        height: 200,
        colorDark : "#0f172a",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });
    }

    function resetLayar() {
      document.getElementById("noPeserta").value = "";
      document.getElementById("view-qr").classList.add("hidden");
      document.getElementById("view-form").classList.remove("hidden");
    }
  </script>
</body>
</html>
