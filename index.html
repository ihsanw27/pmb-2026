<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Peserta Tes Fisik PMB Politeknik Industri Petrokimia Banten</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card-login { max-width: 400px; margin: 80px auto; border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .form-control:focus { box-shadow: none; border-color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card card-login p-4 text-center bg-white">
      <h3 class="fw-bold text-primary mb-1">Check-In Peserta</h3>
      <input type="number" id="noPeserta" class="form-control form-control-lg text-center mb-3 fw-bold" placeholder="Nomor Peserta" autofocus>
      <button onclick="checkIn()" id="btn-checkin" class="btn btn-primary btn-lg w-100 fw-bold">PROSES HADIR</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec";

    // Auto-submit jika pakai barcode scanner gun (enter deteksi)
    document.getElementById("noPeserta").addEventListener("keypress", function(e) {
      if (e.key === "Enter") checkIn();
    });

    async function checkIn() {
      const no = document.getElementById("noPeserta").value;
      if (!no) return;
      const btn = document.getElementById("btn-checkin");
      btn.innerText = "Memproses..."; btn.disabled = true;

      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "checkIn", noPeserta: no }) }).then(r => r.json());
        if (res.success) {
          Swal.fire({ icon: 'success', title: res.nama, text: res.message, timer: 2000, showConfirmButton: false });
          document.getElementById("noPeserta").value = "";
        } else {
          Swal.fire('Gagal', res.message, 'error');
        }
      } catch (e) { Swal.fire('Error', 'Koneksi terputus', 'error'); }
      
      btn.innerText = "PROSES HADIR"; btn.disabled = false;
      document.getElementById("noPeserta").focus();
    }
  </script>
</body>
</html>
