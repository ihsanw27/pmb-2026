<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Peserta Tes Fisik PMB Politeknik Industri Petrokimia Banten</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <nav class="navbar navbar-dark navbar-custom shadow-sm py-3">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>Portal Peserta Tes Fisik</span>
    </div>
  </nav>

  <div class="container">

    <div id="view-login" class="card-custom">
      <div class="mb-3 text-success icon-hero">
        <i class="bi bi-person-bounding-box"></i>
      </div>
      <h4 class="fw-bold mb-1">Cek Kartu Ujian</h4>
      <p class="text-muted small mb-4">Masukkan Nomor Pendaftaran Anda</p>

      <label for="no-peserta" class="form-label fw-semibold">Nomor Pendaftaran</label>
      <input
        type="text"
        id="no-peserta"
        class="form-control form-control-lg mb-4 text-center fw-bold"
        placeholder="Contoh: 2026100001"
        inputmode="numeric"
        autocomplete="off"
        maxlength="10"
        pattern="[0-9]{10}"
        aria-describedby="no-peserta-hint"
      >
      <div id="no-peserta-hint" class="visually-hidden">Masukkan 10 digit angka nomor pendaftaran Anda</div>

      <button onclick="loginPeserta()" class="btn btn-custom" id="btn-login">
        TAMPILKAN QR CODE <i class="bi bi-qr-code ms-1"></i>
      </button>
    </div>

    <div id="view-kartu" class="card-custom hidden">
      <div class="alert alert-success border-0 shadow-sm mb-4">
        <p class="mb-0 small text-uppercase fw-bold opacity-75">Nama Peserta</p>
        <h5 id="nama-peserta" class="mb-0 fw-bold">Memuat...</h5>
        <span id="nomor-peserta" class="badge bg-dark mt-2"></span>
      </div>

      <div class="qr-box shadow-sm">
        <img id="qr-image" src="" alt="QR Code Peserta" width="200" height="200">
      </div>

      <p class="small text-muted mb-4">
        Tunjukkan QR Code ini kepada panitia saat absensi dan di setiap pos tes, harap di screenshot.
      </p>

      <button onclick="keluar()" class="btn btn-light w-100 border text-muted fw-bold">
        <i class="bi bi-box-arrow-left me-2"></i>Kembali
      </button>
    </div>

  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
