<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Portal Peserta Tes Fisik PMB PIPB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* SOFT PASTEL THEME */
    :root { 
      --bg-page: #e8eef2; 
      --bg-card: #fdfdfd; 
      --text-main: #334155; 
      --text-muted: #64748b;
      --accent: #5b7cfa; 
      --accent-hover: #4c6ef5;
      --success: #38d9a9;
      --border-soft: #dce4ec;
    }
    
    body { background: var(--bg-page); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
    
    .kiosk-container { background: var(--bg-card); border-radius: 28px; padding: 40px 30px; box-shadow: 0 20px 40px -10px rgba(100,116,139,0.1); width: 100%; max-width: 420px; text-align: center; border: 1px solid #ffffff; }
    
    /* Logo Styling */
    .campus-logo { max-height: 65px; width: auto; margin: 0 auto 20px auto; display: block; object-fit: contain; }
    
    .form-control { border-radius: 16px; padding: 16px; border: 1.5px solid var(--border-soft); background: #f4f7f9; font-size: 1.1rem; text-align: center; font-weight: 600; color: var(--text-main); transition: all 0.3s; }
    .form-control::placeholder { color: #94a3b8; font-weight: 500; }
    .form-control:focus { background-color: #ffffff; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(91, 124, 250, 0.15); outline: none; }
    
    .btn-custom { border-radius: 16px; padding: 16px; font-weight: 700; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
    .btn-accent { background-color: var(--accent); color: white; border: none; box-shadow: 0 8px 16px rgba(91, 124, 250, 0.2); }
    .btn-accent:hover { background-color: var(--accent-hover); color: white; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(91, 124, 250, 0.25); }
    .btn-accent:disabled { background-color: #a0aec0; box-shadow: none; transform: none; }
    
    .qr-wrapper { background: #ffffff; border: 2px dashed #bac8d3; border-radius: 20px; padding: 20px; display: inline-block; margin-bottom: 20px; }
    .foto-profil { width: 90px; height: 90px; object-fit: cover; border: 4px solid #edf2ff; }
    .avatar-placeholder { width: 90px; height: 90px; background: #edf2ff; color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto; }
    
    .hidden { display: none !important; }
    
    /* Animasi Halus */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
</head>
<body>
  <div class="kiosk-container fade-in">
    
    <div id="view-form">
      <img src="https://i.ibb.co.com/TDsSQQ6B/IMG-1501-removebg-preview.png" alt="Logo Kampus" class="campus-logo">
      
      <h3 class="fw-bold mb-2" style="color: var(--text-main);">Portal Peserta</h3>
      <p class="small mb-4 fw-medium" style="color: var(--text-muted);">Masukkan Nomor Registrasi Anda untuk mendapatkan ID.</p>
      
      <div class="mb-4">
        <input type="text" id="noPeserta" class="form-control" placeholder="Contoh: 2026100001" autocomplete="off">
      </div>
      
      <button onclick="doCheckIn()" class="btn btn-custom btn-accent w-100" id="btn-checkin">
        <i class="bi bi-qr-code-scan" id="btn-icon"></i> <span id="btn-text">Check-in & Buat QR</span>
      </button>
    </div>

    <div id="view-qr" class="hidden fade-in">
      <i class="bi bi-check-circle-fill" style="font-size: 3.5rem; color: var(--success);"></i>
      <h4 class="fw-bold mt-2" style="color: var(--success);">Check-In Sukses!</h4>
      <p class="small mb-3" style="color: var(--text-muted);">Tunjukkan layar ini kepada petugas di setiap pos.</p>
      
      <div class="mb-3">
        <img id="qr-foto" src="" class="rounded-circle shadow-sm mb-2 foto-profil hidden" alt="Foto Peserta">
        <div id="qr-avatar" class="avatar-placeholder mb-2 hidden"><i class="bi bi-person-fill"></i></div>
        <h5 class="fw-bold mb-0 mt-2" id="qr-nama" style="color: var(--text-main);">Nama Peserta</h5>
        <span class="badge rounded-pill mt-2 px-3 py-2 fw-semibold" style="background-color: #edf2ff; color: var(--accent); font-size: 0.85rem; border: 1px solid #dbe4ff;" id="qr-no-peserta">-</span>
      </div>
      
      <div class="qr-wrapper"><div id="qrcode-box" class="mx-auto" style="width: 170px; height: 170px;"></div></div>
      
      <button onclick="resetLayar()" class="btn btn-light fw-bold w-100 rounded-pill py-3 mt-1" style="color: var(--text-muted); background: #f4f7f9; border: 1px solid var(--border-soft);">
        Tutup
      </button>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzJQjxT6QKsyuNMn4KCxsFuRAD5MPItgHdqPVdAvintroDIf9dAeMxhCWyyaX4LkfeW/exec"; 
    let qrcode = null;

    async function doCheckIn() {
      const noInput = document.getElementById("noPeserta").value.trim();
      if (!noInput) return Swal.fire({icon: 'warning', text: 'Masukkan nomor peserta.', confirmButtonColor: '#5b7cfa'});

      let btn = document.getElementById("btn-checkin"), bIcon = document.getElementById("btn-icon"), bText = document.getElementById("btn-text");
      btn.disabled = true; bIcon.className = "spinner-border spinner-border-sm"; bText.innerText = "Memproses...";

      try {
        let res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "checkIn", noPeserta: noInput }) });
        let json = JSON.parse(await res.text());

        if (json.success) tampilkanQR(noInput, json.nama, json.foto);
        else Swal.fire({icon: 'error', title: 'Gagal', text: json.message, confirmButtonColor: '#5b7cfa'});
      } catch(e) { Swal.fire({icon: 'error', text: 'Koneksi Terputus / Server Error.', confirmButtonColor: '#5b7cfa'}); }

      btn.disabled = false; bIcon.className = "bi bi-qr-code-scan"; bText.innerText = "Check-in & Buat QR";
    }

    function tampilkanQR(nomor, namaPeserta, linkFoto) {
      document.getElementById("view-form").classList.add("hidden"); document.getElementById("view-qr").classList.remove("hidden");
      document.getElementById("qr-no-peserta").innerText = nomor.toUpperCase();
      document.getElementById("qr-nama").innerText = namaPeserta ? namaPeserta : "Peserta";

      let elFoto = document.getElementById("qr-foto"), elAvatar = document.getElementById("qr-avatar");
      if (linkFoto && linkFoto.startsWith("http")) {
        elFoto.src = linkFoto; elFoto.classList.remove("hidden"); elAvatar.classList.add("hidden");
      } else {
        elFoto.classList.add("hidden"); elAvatar.classList.remove("hidden");
      }

      document.getElementById("qrcode-box").innerHTML = ""; 
      qrcode = new QRCode(document.getElementById("qrcode-box"), { text: nomor, width: 170, height: 170, colorDark : "#334155", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
    }

    function resetLayar() {
      document.getElementById("noPeserta").value = ""; document.getElementById("qr-foto").src = "";
      document.getElementById("view-qr").classList.add("hidden"); document.getElementById("view-form").classList.remove("hidden");
    }
  </script>
</body>
</html>
